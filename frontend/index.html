<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="referrer" content="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      These hidden audio elements MUST live in the DOM.
      Android Chrome only grants OS-level media session focus (lock screen / notification controls)
      to <audio> elements that are attached to the document — floating `new Audio()` objects are ignored.
    -->
    <audio id="pulse-primary-audio" preload="none" crossorigin="anonymous" style="display:none"></audio>
    <audio id="pulse-crossfade-audio" preload="none" crossorigin="anonymous" style="display:none"></audio>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
